<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />

  <!-- Meta Title & SEO -->
  <title>Shobi & Aswin 💍 — Share Your Wedding Memories</title>
  <meta name="description" content="Upload your photos and videos from Shobi & Aswin's wedding. Help us build a beautiful memory album of our special day!" />
  <meta name="theme-color" content="#1a0a0a" />

  <!-- Open Graph (WhatsApp / iMessage link previews) -->
  <meta property="og:title" content="Shobi & Aswin 💍 — Share Your Wedding Memories" />
  <meta property="og:description" content="You were part of something magical. Upload your photos & videos and help us relive every moment! ❤️" />
  <meta property="og:image" content="logo.png" />
  <meta property="og:type" content="website" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Shobi & Aswin 💍 — Share Your Wedding Memories" />
  <meta name="twitter:description" content="Upload your photos & videos from our wedding day!" />
  <meta name="twitter:image" content="logo.png" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="logo.png" />
  <link rel="apple-touch-icon" href="logo.png" />

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #c9a84c;
      --gold-light: #f0d68a;
      --deep: #1a0a0a;
      --rose: #c0445a;
    }

    html { -webkit-text-size-adjust: 100%; }

    body {
      font-family: 'Lato', sans-serif;
      background: var(--deep);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Stars ── */
    #stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .star {
      position: absolute; border-radius: 50%; background: white;
      animation: twinkle var(--d, 3s) infinite alternate ease-in-out;
    }
    @keyframes twinkle { from { opacity: 0.1; } to { opacity: 0.9; } }

    /* ── Petals ── */
    .petal {
      position: fixed; top: -40px;
      animation: fall linear infinite;
      pointer-events: none; z-index: 0; opacity: 0.7;
    }
    @keyframes fall {
      0%   { transform: translateY(0) rotate(0deg); opacity: 0.8; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    /* ── Wrapper ── */
    .wrapper {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: 36px 16px 60px;
      /* iPhone safe area */
      padding-bottom: max(60px, calc(60px + env(safe-area-inset-bottom)));
    }

    /* ── Logo ── */
    .logo-wrap {
      margin-bottom: 14px;
      animation: fadeDown 0.9s ease both;
    }
    .logo-wrap img {
      width: 76px; height: 76px;
      border-radius: 50%;
      border: 2px solid var(--gold);
      box-shadow: 0 0 24px rgba(201,168,76,0.45);
      object-fit: cover;
      display: block;
    }

    /* ── Heading ── */
    .ornament {
      color: var(--gold);
      font-size: 1rem;
      letter-spacing: 6px;
      text-transform: uppercase;
      margin-bottom: 6px;
      animation: fadeDown 1s ease both;
    }
    .names {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.4rem, 11vw, 4.8rem);
      color: var(--gold-light);
      text-shadow: 0 0 40px rgba(201,168,76,0.45), 0 2px 6px rgba(0,0,0,0.6);
      line-height: 1.1;
      text-align: center;
      animation: fadeDown 1.1s ease both;
    }
    .ampersand { font-style: italic; color: var(--rose); }
    .date-line {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      color: var(--gold);
      font-size: clamp(0.9rem, 3vw, 1.05rem);
      margin-top: 8px;
      letter-spacing: 2px;
      text-align: center;
      animation: fadeDown 1.2s ease both;
    }
    .divider {
      width: min(260px, 78vw);
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 20px auto;
      position: relative;
      animation: fadeIn 1.4s ease both;
    }
    .divider::before {
      content: '✦';
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: var(--deep);
      padding: 0 8px;
      color: var(--gold); font-size: 0.85rem;
    }

    /* ── Card ── */
    .card {
      background: linear-gradient(145deg, #2a0e0e, #200d0d);
      border: 1px solid rgba(201,168,76,0.35);
      border-radius: 20px;
      padding: clamp(22px, 6vw, 38px) clamp(18px, 6vw, 34px);
      width: 100%;
      max-width: 500px;
      box-shadow: 0 0 60px rgba(201,168,76,0.1), 0 20px 60px rgba(0,0,0,0.6);
      animation: riseUp 1.3s cubic-bezier(.22,1,.36,1) both;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at top left, rgba(201,168,76,0.06), transparent 60%);
      pointer-events: none;
    }
    .corner { position: absolute; color: var(--gold); font-size: 1.3rem; opacity: 0.3; line-height: 1; }
    .corner.tl { top: 10px; left: 12px; }
    .corner.tr { top: 10px; right: 12px; }
    .corner.bl { bottom: 10px; left: 12px; }
    .corner.br { bottom: 10px; right: 12px; }

    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.2rem, 4.5vw, 1.5rem);
      color: var(--gold-light);
      text-align: center;
      margin-bottom: 6px;
    }
    .card-sub {
      text-align: center;
      color: #c8a8a8;
      font-size: clamp(0.82rem, 3vw, 0.93rem);
      margin-bottom: 24px;
      line-height: 1.65;
    }

    /* ── Drop zone ── */
    .drop-zone {
      border: 2px dashed rgba(201,168,76,0.45);
      border-radius: 14px;
      padding: clamp(26px, 8vw, 38px) 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
      background: rgba(201,168,76,0.03);
      -webkit-tap-highlight-color: transparent;
    }
    .drop-zone:hover, .drop-zone.dragover {
      border-color: var(--gold);
      background: rgba(201,168,76,0.09);
      box-shadow: 0 0 20px rgba(201,168,76,0.15);
    }
    .drop-zone input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer;
      width: 100%; height: 100%;
      font-size: 16px; /* prevents iOS zoom */
    }
    .drop-icon { font-size: clamp(2.2rem, 9vw, 3rem); margin-bottom: 8px; }
    .drop-text {
      font-family: 'Playfair Display', serif;
      color: var(--gold-light);
      font-size: clamp(0.95rem, 3.5vw, 1.1rem);
      margin-bottom: 4px;
    }
    .drop-hint { color: #9a7070; font-size: clamp(0.74rem, 2.6vw, 0.82rem); }

    /* ── Preview ── */
    #preview-strip {
      display: flex; flex-wrap: wrap; gap: 8px;
      justify-content: center;
      margin-top: 14px;
    }
    .thumb {
      width: 58px; height: 58px;
      object-fit: cover; border-radius: 8px;
      border: 2px solid var(--gold);
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
      animation: popIn 0.3s ease;
    }
    .thumb-video {
      width: 58px; height: 58px; border-radius: 8px;
      border: 2px solid var(--rose);
      background: #2a0e0e;
      display: flex; align-items: center; justify-content: center;
      color: var(--rose); font-size: 1.4rem;
      animation: popIn 0.3s ease;
    }
    @keyframes popIn {
      from { transform: scale(0.5); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    /* ── Button ── */
    .btn-upload {
      margin-top: 22px;
      width: 100%;
      padding: clamp(14px, 4vw, 17px) 16px;
      font-family: 'Playfair Display', serif;
      font-size: clamp(1rem, 3.8vw, 1.1rem);
      letter-spacing: 1.5px;
      color: var(--deep);
      background: linear-gradient(135deg, var(--gold-light), var(--gold));
      border: none;
      border-radius: 50px;
      cursor: pointer;
      position: relative; overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(201,168,76,0.35);
      min-height: 54px;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .btn-upload::before {
      content: '';
      position: absolute; top: 0; left: -100%;
      width: 60%; height: 100%;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.35), transparent);
      transition: left 0.5s;
    }
    .btn-upload:hover::before { left: 140%; }
    .btn-upload:hover  { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(201,168,76,0.5); }
    .btn-upload:active { transform: scale(0.97); }
    .btn-upload:disabled {
      background: #4a3a2a; color: #7a6a5a;
      cursor: not-allowed; box-shadow: none; transform: none;
    }

    /* ── Progress ── */
    .progress-wrap {
      margin-top: 18px;
      background: rgba(201,168,76,0.12);
      border-radius: 50px;
      overflow: hidden; height: 10px;
      display: none;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--gold), var(--rose), var(--gold));
      background-size: 200% 100%;
      border-radius: 50px; width: 0%;
      transition: width 0.4s ease;
      animation: shimmer 2s linear infinite;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }

    /* ── Status ── */
    #status {
      margin-top: 18px;
      text-align: center;
      min-height: 22px;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(0.86rem, 3vw, 1rem);
      color: var(--gold-light);
    }

    /* ── Confetti ── */
    .confetti-piece {
      position: fixed; top: 40%;
      font-size: 1.4rem;
      pointer-events: none; z-index: 99;
      animation: burst 1.2s ease-out forwards;
    }
    @keyframes burst {
      0%   { transform: translate(0,0) rotate(0deg); opacity: 1; }
      100% { transform: translate(var(--tx), var(--ty)) rotate(var(--tr)); opacity: 0; }
    }

    /* ── Footer ── */
    .footer {
      margin-top: 36px;
      color: #5a3a3a;
      font-size: 0.75rem;
      letter-spacing: 2px;
      text-align: center;
    }

    /* ── Keyframes ── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes riseUp {
      from { opacity: 0; transform: translateY(32px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; } to { opacity: 1; }
    }
  </style>
</head>
<body>

<div id="stars"></div>
<div id="petals"></div>

<div class="wrapper">

  <div class="logo-wrap">
    <img src="logo.png" alt="Shobi & Aswin" />
  </div>

  <div class="ornament">— ✦ —</div>
  <div class="names">Shobi <span class="ampersand">&</span> Aswin</div>
  <div class="date-line">Forever begins today</div>
  <div class="divider"></div>

  <div class="card">
    <span class="corner tl">❧</span>
    <span class="corner tr">❧</span>
    <span class="corner bl">❧</span>
    <span class="corner br">❧</span>

    <div class="card-title">📸 Share Your Memories</div>
    <div class="card-sub">
      You witnessed something magical today.<br/>
      Drop your photos &amp; videos below and help us<br/>
      relive every beautiful moment ❤️
    </div>

    <div class="drop-zone" id="dropZone">
      <input type="file" id="media" accept="image/*,video/*" multiple onchange="handleFiles(this.files)" />
      <div class="drop-icon">💌</div>
      <div class="drop-text">Tap to choose photos &amp; videos</div>
      <div class="drop-hint">JPG · PNG · MP4 · MOV — any format welcome</div>
    </div>

    <div id="preview-strip"></div>

    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <button class="btn-upload" id="uploadBtn" onclick="upload()">
      ✨ Upload to Our Gallery ✨
    </button>

    <div id="status"></div>
  </div>

  <div class="footer">SHOBI × ASWIN &nbsp;·&nbsp; WITH LOVE</div>
</div>

<script>
  /* Stars */
  const starsEl = document.getElementById('stars');
  const starCount = window.innerWidth < 480 ? 55 : 110;
  for (let i = 0; i < starCount; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const sz = Math.random() * 2.4 + 0.5;
    s.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${(Math.random()*4+1).toFixed(1)}s;animation-delay:${(Math.random()*5).toFixed(1)}s`;
    starsEl.appendChild(s);
  }

  /* Petals */
  const petalEmojis = ['🌸','🌹','🌺','🪷','✨','💛','💐'];
  const petalsEl = document.getElementById('petals');
  function spawnPetal() {
    const p = document.createElement('div');
    p.className = 'petal';
    p.textContent = petalEmojis[Math.floor(Math.random() * petalEmojis.length)];
    const dur = Math.random() * 8 + 6;
    p.style.cssText = `left:${Math.random()*100}%;animation-duration:${dur}s;animation-delay:${Math.random()*3}s;font-size:${(Math.random()*0.9+0.8).toFixed(1)}rem`;
    petalsEl.appendChild(p);
    setTimeout(() => p.remove(), (dur + 4) * 1000);
  }
  for (let i = 0; i < 10; i++) spawnPetal();
  setInterval(spawnPetal, 2400);

  /* Drag & drop (desktop) */
  const dropZone = document.getElementById('dropZone');
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault(); dropZone.classList.remove('dragover');
    handleFiles(e.dataTransfer.files);
  });

  let selectedFiles = [];

  function handleFiles(files) {
    selectedFiles = Array.from(files);
    const strip = document.getElementById('preview-strip');
    strip.innerHTML = '';
    selectedFiles.forEach(file => {
      if (file.type.startsWith('image/')) {
        const img = document.createElement('img');
        img.className = 'thumb';
        img.src = URL.createObjectURL(file);
        strip.appendChild(img);
      } else {
        const div = document.createElement('div');
        div.className = 'thumb-video';
        div.textContent = '🎬';
        strip.appendChild(div);
      }
    });
    const n = selectedFiles.length;
    document.getElementById('uploadBtn').innerHTML = `✨ Upload ${n} File${n !== 1 ? 's' : ''} ✨`;
  }

  async function upload() {
    if (!selectedFiles.length) {
      dropZone.style.borderColor = 'var(--rose)';
      setTimeout(() => dropZone.style.borderColor = '', 1000);
      setStatus('💭 Please choose some photos or videos first!');
      return;
    }
    const btn = document.getElementById('uploadBtn');
    const progressWrap = document.getElementById('progressWrap');
    const progressBar = document.getElementById('progressBar');
    btn.disabled = true;
    progressWrap.style.display = 'block';

    for (let i = 0; i < selectedFiles.length; i++) {
      progressBar.style.width = Math.round((i / selectedFiles.length) * 100) + '%';
      setStatus(`🎞️ Uploading ${i + 1} of ${selectedFiles.length}… hold tight!`);
      await uploadSingle(selectedFiles[i]);
    }

    progressBar.style.width = '100%';
    await new Promise(r => setTimeout(r, 400));
    progressWrap.style.display = 'none';
    setStatus('🎉 All uploaded! Thank you for celebrating with us 💕');
    btn.disabled = false;
    btn.innerHTML = '✨ Upload More Memories ✨';
    selectedFiles = [];
    document.getElementById('preview-strip').innerHTML = '';
    burstConfetti();
  }

  function setStatus(msg) {
    document.getElementById('status').textContent = msg;
  }

  function uploadSingle(file) {
    return new Promise(resolve => {
      const reader = new FileReader();
      reader.onload = async function () {
        const base64 = reader.result.split(',')[1];
        try {
          await fetch('https://script.google.com/macros/s/AKfycbyVS7PmeSiRLuMc3Xq8PXyONORMeBLmJSSdGiXKbfpyUZTesox45SG8NrHIZsJx6xoOWw/exec', {
            method: 'POST',
            body: new URLSearchParams({ file: base64, fileName: file.name, mimeType: file.type })
          });
        } catch (e) { /* silent */ }
        resolve();
      };
      reader.readAsDataURL(file);
    });
  }

  function burstConfetti() {
    const emojis = ['🎊','🥂','💍','🌸','❤️','✨','🎉','🌹','💛','🥳'];
    for (let i = 0; i < 22; i++) {
      const c = document.createElement('div');
      c.className = 'confetti-piece';
      c.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      const angle = Math.random() * 360;
      const dist = Math.random() * 180 + 60;
      c.style.cssText = `left:${10+Math.random()*80}%;--tx:${Math.cos(angle*Math.PI/180)*dist}px;--ty:${-(Math.random()*250+80)}px;--tr:${Math.random()*720-360}deg;animation-delay:${Math.random()*0.4}s`;
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 1800);
    }
  }
</script>
</body>
</html>
