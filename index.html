<!DOCTYPE html>
<html>
<head>
  <title>Shobi & Aswin Wedding Upload</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 40px;
      background: #fff8f0;
    }
    h2 { margin-bottom: 5px; }
    p { color: #555; }
    input, button {
      padding: 12px;
      margin: 12px;
      font-size: 16px;
    }
    button {
      background: black;
      color: white;
      border: none;
      cursor: pointer;
    }
    button:hover { opacity: 0.8; }
    #status { margin-top: 20px; font-weight: bold; }
  </style>
</head>
<body>

<h2>📸 Upload Your Wedding Photos & Videos</h2>
<p>Thank you for celebrating with us ❤️</p>

<input type="file" id="media" accept="image/*,video/*" multiple />
<br/>
<button onclick="upload()">Upload</button>

<div id="status"></div>

<script>
async function upload() {
  const input = document.getElementById("media");
  const status = document.getElementById("status");

  if (!input.files.length) {
    alert("Please select files");
    return;
  }

  status.innerText = "Uploading... Please wait ❤️";

  for (let i = 0; i < input.files.length; i++) {
    const file = input.files[i];

    await uploadSingle(file);
    status.innerText = `Uploaded ${i + 1} of ${input.files.length}`;
  }

  status.innerText = "All files uploaded successfully 🎉";
}

function uploadSingle(file) {
  return new Promise((resolve) => {
    const reader = new FileReader();

    reader.onload = async function() {
      const base64 = reader.result.split(",")[1];

      await fetch("https://script.google.com/macros/s/AKfycbyVS7PmeSiRLuMc3Xq8PXyONORMeBLmJSSdGiXKbfpyUZTesox45SG8NrHIZsJx6xoOWw/exec", {
        method: "POST",
        body: new URLSearchParams({
          file: base64,
          fileName: file.name,
          mimeType: file.type
        })
      });

      resolve();
    };

    reader.readAsDataURL(file);
  });
}
</script>

</body>
</html>
