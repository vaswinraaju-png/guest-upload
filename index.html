<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- SEO -->
  <title>Shobi & Aswin Wedding Gallery 💍 | Share Your Memories</title>
  <meta name="description" content="You celebrated with Shobi & Aswin 💍 Share your photos and videos from our magical wedding day and be part of our forever memories." />

  <!-- Open Graph -->
  <meta property="og:title" content="Shobi & Aswin Wedding 💍" />
  <meta property="og:description" content="Share your photos & videos from our magical day ❤️" />
  <meta property="og:image" content="logo.png" />
  <meta property="og:type" content="website" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Shobi & Aswin Wedding 💍" />
  <meta name="twitter:description" content="Upload your beautiful memories from our special day ❤️" />
  <meta name="twitter:image" content="logo.png" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="logo.png" />
  <link rel="apple-touch-icon" href="logo.png" />

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #c9a84c;
      --gold-light: #f0d68a;
      --deep: #1a0a0a;
      --rose: #c0445a;
    }

    body {
      font-family: 'Lato', sans-serif;
      background: var(--deep);
      min-height: 100vh;
      overflow-x: hidden;
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* Stars */
    #stars { position: fixed; inset: 0; pointer-events: none; }
    .star {
      position: absolute;
      border-radius: 50%;
      background: white;
      animation: twinkle var(--d,3s) infinite alternate;
    }
    @keyframes twinkle { from {opacity:.1;} to {opacity:.9;} }

    /* Wrapper */
    .wrapper {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 60px;
    }

    .names {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.5rem,8vw,4.5rem);
      color: var(--gold-light);
      text-align: center;
      margin-bottom: 10px;
    }

    .divider {
      width: 220px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 20px auto;
    }

    .card {
      background: linear-gradient(145deg, #2a0e0e, #1f1010);
      border: 1px solid rgba(201,168,76,0.35);
      border-radius: 20px;
      padding: 36px;
      max-width: 520px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }

    .card-title {
      font-family: 'Playfair Display', serif;
      color: var(--gold-light);
      text-align: center;
      margin-bottom: 10px;
      font-size: 1.4rem;
    }

    .card-sub {
      text-align: center;
      color: #c8a8a8;
      font-size: 0.9rem;
      margin-bottom: 24px;
    }

    .drop-zone {
      border: 2px dashed rgba(201,168,76,0.45);
      border-radius: 14px;
      padding: 30px;
      text-align: center;
      cursor: pointer;
      position: relative;
    }

    .drop-zone input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .btn-upload {
      margin-top: 20px;
      width: 100%;
      padding: 16px;
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      background: linear-gradient(135deg, var(--gold-light), var(--gold));
      border: none;
      border-radius: 50px;
      cursor: pointer;
    }

    .progress-wrap {
      margin-top: 15px;
      background: rgba(201,168,76,0.12);
      border-radius: 50px;
      overflow: hidden;
      height: 10px;
      display: none;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--gold), var(--rose));
      transition: width 0.4s;
    }

    #preview-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 15px;
    }

    .thumb, .thumb-video {
      width: 60px;
      height: 60px;
      border-radius: 8px;
      border: 2px solid var(--gold);
      object-fit: cover;
    }

    .thumb-video {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #2a0e0e;
      font-size: 1.5rem;
      color: var(--rose);
    }

    #status {
      margin-top: 15px;
      text-align: center;
      color: var(--gold-light);
      font-family: 'Playfair Display', serif;
    }

    @media (max-width:600px){
      .wrapper { padding: 24px 16px 50px; }
      .card { padding: 24px 18px; }
      .btn-upload { padding: 18px; }
    }
  </style>
</head>

<body>

<div id="stars"></div>

<div class="wrapper">
  <div class="names">Shobi & Aswin</div>
  <div class="divider"></div>

  <div class="card">
    <div class="card-title">📸 Share Your Memories</div>
    <div class="card-sub">
      You witnessed something magical today.<br/>
      Drop your photos & videos below ❤️
    </div>

    <div class="drop-zone">
      <input type="file" id="media" accept="image/*,video/*" multiple onchange="handleFiles(this.files)" />
      Tap or drag your photos & videos here
    </div>

    <div id="preview-strip"></div>

    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <button class="btn-upload" id="uploadBtn" onclick="upload()">
      ✨ Upload to Our Gallery ✨
    </button>

    <div id="status"></div>
  </div>
</div>

<script>
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 100; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random()*2+1;
    s.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${Math.random()*4+1}s`;
    starsEl.appendChild(s);
  }

  let selectedFiles = [];

  function handleFiles(files) {
    selectedFiles = Array.from(files);
    const strip = document.getElementById('preview-strip');
    strip.innerHTML = '';

    selectedFiles.forEach(file => {
      if (file.type.startsWith('image/')) {
        const img = document.createElement('img');
        img.src = URL.createObjectURL(file);
        img.className = 'thumb';
        strip.appendChild(img);
      } else {
        const div = document.createElement('div');
        div.className = 'thumb-video';
        div.textContent = '🎬';
        strip.appendChild(div);
      }
    });

    document.getElementById('uploadBtn').innerHTML =
      `✨ Upload ${selectedFiles.length} File${selectedFiles.length!==1?'s':''} ✨`;
  }

  async function upload() {
    if (!selectedFiles.length) {
      setStatus('Please select files first 💭');
      return;
    }

    const btn = document.getElementById('uploadBtn');
    const progressWrap = document.getElementById('progressWrap');
    const progressBar = document.getElementById('progressBar');

    btn.disabled = true;
    progressWrap.style.display = 'block';

    for (let i=0;i<selectedFiles.length;i++){
      progressBar.style.width = (i/selectedFiles.length)*100 + '%';
      await uploadSingle(selectedFiles[i]);
    }

    progressBar.style.width = '100%';
    setStatus('🎉 All memories uploaded successfully!');
    btn.disabled = false;
    progressWrap.style.display = 'none';
    selectedFiles = [];
  }

  function setStatus(msg){
    document.getElementById('status').textContent = msg;
  }

  function uploadSingle(file){
    return new Promise(resolve=>{
      const reader = new FileReader();
      reader.onload = async function(){
        const base64 = reader.result.split(',')[1];
        try{
          await fetch('YOUR_GOOGLE_SCRIPT_WEBAPP_URL_HERE',{
            method:'POST',
            body:new URLSearchParams({
              file:base64,
              fileName:file.name,
              mimeType:file.type
            })
          });
        }catch(e){}
        resolve();
      };
      reader.readAsDataURL(file);
    });
  }
</script>

</body>
</html>
